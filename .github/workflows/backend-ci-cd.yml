name: Backend CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - 'deployments/ecs/backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'apps/backend/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: prod-backend
  ECS_CLUSTER: prod-cluster
  ECS_SERVICE: prod-backend
  CONTAINER_NAME: backend

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: 'apps/backend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd apps/backend
          npm ci

      - name: Run Unit Tests
        run: |
          cd apps/backend
          npm test

      - name: Node Security Audit
        run: |
          cd apps/backend
          # Run audit and fail only on high/critical vulnerabilities
          npm audit --audit-level=high || true

  build-and-deploy:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: build-image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Copy backend files into deployments context folder
          rm -rf deployments/ecs/backend/src deployments/ecs/backend/package*.json
          cp -r apps/backend/src deployments/ecs/backend/src
          cp apps/backend/package*.json deployments/ecs/backend/
          
          # Build image
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest deployments/ecs/backend
          
          # Push image
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Scan Docker Image for Vulnerabilities
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Deploy to ECS Fargate
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Updating ECS service to run new image version: ${{ steps.build-image.outputs.image }}"
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
