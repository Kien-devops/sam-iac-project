AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI Assistant Lambda Stack

Parameters:
  Environment:
    Type: String
  ProductsTable:
    Type: String

Resources:
  AIAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: ../../src/ai-assistant/
      Description: Conversational e-commerce assistant using Bedrock.
      Environment:
        Variables:
          PRODUCTS_TABLE: !Ref ProductsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"

Outputs:
  AIAssistantFunctionArn:
    Value: !GetAtt AIAssistantFunction.Arn
