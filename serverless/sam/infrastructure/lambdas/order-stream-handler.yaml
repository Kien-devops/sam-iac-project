AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Order Stream Handler Lambda Stack

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs18.x
    Architectures:
      - x86_64

Parameters:
  Environment:
    Type: String
  WebSocketConnectionsTable:
    Type: String
  WebSocketApiId:
    Type: String
  OrdersTableStreamArn:
    Type: String

Resources:
  OrderStreamHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: ../../src/stream-handler/
      Description: Processes DynamoDB Streams for Orders Table to push events over WebSocket connections.
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
          WEBSOCKET_API_ID: !Ref WebSocketApiId
          AWS_REGION_NAME: !Ref AWS::Region
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApiId}/*
      Events:
        OrdersStream:
          Type: DynamoDB
          Properties:
            Stream: !Ref OrdersTableStreamArn
            StartingPosition: LATEST
            BatchSize: 10

Outputs:
  OrderStreamHandlerFunctionArn:
    Value: !GetAtt OrderStreamHandlerFunction.Arn
