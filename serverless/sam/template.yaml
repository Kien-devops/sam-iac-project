AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
# Orchestrated root template for serverless e-commerce infrastructure
Description: >
  hybrid-devops-ecommerce-aws serverless stack
  Orchestrates granular nested stacks for Database, Storage, Messaging, API Gateway, and Compute.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment stage (dev, staging, prod)

Resources:
  # =========================================================================
  # DynamoDB Stacks
  # =========================================================================

  ProductsTableStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/dynamodb/products-table.yaml
      Parameters:
        Environment: !Ref Environment

  OrdersTableStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/dynamodb/orders-table.yaml
      Parameters:
        Environment: !Ref Environment

  UsersTableStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/dynamodb/users-table.yaml
      Parameters:
        Environment: !Ref Environment

  DailyReportsTableStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/dynamodb/daily-reports-table.yaml
      Parameters:
        Environment: !Ref Environment

  WebSocketConnectionsTableStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/dynamodb/websocket-connections-table.yaml
      Parameters:
        Environment: !Ref Environment

  # =========================================================================
  # S3 Storage Stacks
  # =========================================================================

  InvoiceBucketStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/s3/invoice-bucket.yaml
      Parameters:
        Environment: !Ref Environment

  ProductImagesBucketStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/s3/product-images-bucket.yaml
      Parameters:
        Environment: !Ref Environment
        ImageAnalyzerFunctionArn: !GetAtt ImageAnalyzerFunctionStack.Outputs.ImageAnalyzerFunctionArn

  # =========================================================================
  # SQS Queues Stacks
  # =========================================================================

  OrderCreatedQueueStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/sqs/order-created-queue.yaml
      Parameters:
        Environment: !Ref Environment

  SendEmailQueueStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/sqs/send-email-queue.yaml
      Parameters:
        Environment: !Ref Environment

  # =========================================================================
  # SNS Topics Stacks
  # =========================================================================

  OrderCreatedTopicStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/sns/order-created-topic.yaml
      Parameters:
        Environment: !Ref Environment
        OrderCreatedQueueArn: !GetAtt OrderCreatedQueueStack.Outputs.OrderCreatedQueueArn
        SendEmailQueueArn: !GetAtt SendEmailQueueStack.Outputs.SendEmailQueueArn

  EmailNotificationTopicStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/sns/email-notification-topic.yaml
      Parameters:
        Environment: !Ref Environment

  # =========================================================================
  # API Gateway Stacks
  # =========================================================================

  WebSocketApiStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/apigateway/websocket-api.yaml
      Parameters:
        Environment: !Ref Environment
        WebSocketHandlerFunctionArn: !GetAtt WebSocketHandlerFunctionStack.Outputs.WebSocketHandlerFunctionArn

  # =========================================================================
  # Lambda Function Stacks
  # =========================================================================

  AIAssistantFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/ai-assistant.yaml
      Parameters:
        Environment: !Ref Environment
        ProductsTable: !GetAtt ProductsTableStack.Outputs.ProductsTable

  ImageAnalyzerFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/image-analyzer.yaml
      Parameters:
        Environment: !Ref Environment
        ProductsTable: !GetAtt ProductsTableStack.Outputs.ProductsTable

  SendEmailFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/send-email.yaml
      Parameters:
        Environment: !Ref Environment
        SendEmailQueueArn: !GetAtt SendEmailQueueStack.Outputs.SendEmailQueueArn
        EmailNotificationTopicArn: !GetAtt EmailNotificationTopicStack.Outputs.EmailNotificationTopicArn

  GenerateInvoiceFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/generate-invoice.yaml
      Parameters:
        Environment: !Ref Environment
        InvoicePDFBucket: !GetAtt InvoiceBucketStack.Outputs.InvoicePDFBucket
        OrdersTable: !GetAtt OrdersTableStack.Outputs.OrdersTable
        OrderCreatedQueueArn: !GetAtt OrderCreatedQueueStack.Outputs.OrderCreatedQueueArn

  DailyRevenueReportFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/daily-revenue-report.yaml
      Parameters:
        Environment: !Ref Environment
        OrdersTable: !GetAtt OrdersTableStack.Outputs.OrdersTable
        DailyReportsTable: !GetAtt DailyReportsTableStack.Outputs.DailyReportsTable

  WebSocketHandlerFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/websocket-handler.yaml
      Parameters:
        Environment: !Ref Environment
        WebSocketConnectionsTable: !GetAtt WebSocketConnectionsTableStack.Outputs.WebSocketConnectionsTable

  OrderStreamHandlerFunctionStack:
    Type: AWS::Serverless::Application
    Properties:
      Location: ./infrastructure/lambdas/order-stream-handler.yaml
      Parameters:
        Environment: !Ref Environment
        WebSocketConnectionsTable: !GetAtt WebSocketConnectionsTableStack.Outputs.WebSocketConnectionsTable
        WebSocketApiId: !GetAtt WebSocketApiStack.Outputs.WebSocketApiId
        OrdersTableStreamArn: !GetAtt OrdersTableStack.Outputs.OrdersTableStreamArn

Outputs:
  ProductsTableName:
    Value: !GetAtt ProductsTableStack.Outputs.ProductsTable
    Export:
      Name: !Sub ${AWS::StackName}-ProductsTable
  OrdersTableName:
    Value: !GetAtt OrdersTableStack.Outputs.OrdersTable
    Export:
      Name: !Sub ${AWS::StackName}-OrdersTable
  DailyReportsTableName:
    Value: !GetAtt DailyReportsTableStack.Outputs.DailyReportsTable
    Export:
      Name: !Sub ${AWS::StackName}-DailyReportsTable
  UsersTableName:
    Value: !GetAtt UsersTableStack.Outputs.UsersTable
    Export:
      Name: !Sub ${AWS::StackName}-UsersTable

  InvoiceBucketName:
    Value: !GetAtt InvoiceBucketStack.Outputs.InvoicePDFBucket
  ProductImagesBucketName:
    Value: !GetAtt ProductImagesBucketStack.Outputs.ProductImagesBucket
  OrderCreatedTopicArn:
    Value: !GetAtt OrderCreatedTopicStack.Outputs.OrderCreatedTopicArn
    Export:
      Name: !Sub ${AWS::StackName}-OrderCreatedTopicArn
  EmailNotificationTopicArn:
    Value: !GetAtt EmailNotificationTopicStack.Outputs.EmailNotificationTopicArn
    Export:
      Name: !Sub ${AWS::StackName}-EmailNotificationTopicArn
  WebSocketApiUrl:
    Value: !GetAtt WebSocketApiStack.Outputs.WebSocketApiUrl
    Export:
      Name: !Sub ${AWS::StackName}-WebSocketApiUrl
