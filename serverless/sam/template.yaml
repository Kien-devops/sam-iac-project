AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  hybrid-devops-ecommerce-aws serverless stack
  Deploys SNS, SQS, DynamoDB, S3, and Lambda handlers for invoicing, emails, and reporting.

Parameters:
  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: Environment stage (dev, staging, prod)

Globals:
  Function:
    Timeout: 30
    MemorySize: 128
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENV: !Ref Environment
        LOG_LEVEL: INFO

Resources:
  # =========================================================================
  # Databases & Storage
  # =========================================================================
  ProductsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub ProductsTable-${Environment}
      PrimaryKey:
        Name: id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub OrdersTable-${Environment}
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  DailyReportsTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub DailyReportsTable-${Environment}
      PrimaryKey:
        Name: date
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5

  UsersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub UsersTable-${Environment}
      PrimaryKey:
        Name: id
        Type: String
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5


  InvoicePDFBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      # BucketName intentionally omitted - CloudFormation auto-generates a unique name
      # to prevent 409 conflicts when re-deploying after rollback
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # =========================================================================
  # Messaging Layer (SNS & SQS)
  # =========================================================================
  OrderCreatedTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub OrderCreatedTopic-${Environment}

  OrderCreatedQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub OrderCreatedQueue-${Environment}
      VisibilityTimeout: 90 # VisTimeout should be at least 3x function timeout

  SNSToSQSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderCreatedTopic
      Endpoint: !GetAtt OrderCreatedQueue.Arn
      Protocol: sqs

  # Policy to allow SNS to write to SQS Queue
  SQSQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref OrderCreatedQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt OrderCreatedQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref OrderCreatedTopic

  SendEmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub SendEmailQueue-${Environment}
      VisibilityTimeout: 90

  SNSToSendEmailQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderCreatedTopic
      Endpoint: !GetAtt SendEmailQueue.Arn
      Protocol: sqs

  SendEmailQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref SendEmailQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt SendEmailQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref OrderCreatedTopic

  # =========================================================================
  # SNS Topic for Email Notifications (separated from OrderCreatedTopic)
  # =========================================================================

  EmailNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub EmailNotificationTopic-${Environment}

  # =========================================================================
  # Lambda Compute Handlers
  # =========================================================================

  SendEmailConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/send-email/
      Description: Read from SQS, build invoice, publish to EmailNotificationTopic for delivery.
      Environment:
        Variables:
          EMAIL_TOPIC_ARN: !Ref EmailNotificationTopic
      Policies:
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sns:Publish
                - sns:ListSubscriptionsByTopic
                - sns:GetSubscriptionAttributes
                - sns:SetSubscriptionAttributes
              Resource: !Ref EmailNotificationTopic
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt SendEmailQueue.Arn
            BatchSize: 10

  GenerateInvoiceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/generate-invoice/
      Description: Generate invoice PDF text and upload to S3 Bucket.
      Environment:
        Variables:
          INVOICE_BUCKET: !Ref InvoicePDFBucket
          ORDERS_TABLE: !Ref OrdersTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref InvoicePDFBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
      Events:
        SQSQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt OrderCreatedQueue.Arn
            BatchSize: 10

  DailyRevenueReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/daily-report/
      Description: Daily scheduler to aggregate orders revenue.
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          REPORTS_TABLE: !Ref DailyReportsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub OrdersTable-${Environment}
        - DynamoDBCrudPolicy:
            TableName: !Sub DailyReportsTable-${Environment}
      Events:
        DailyCronTrigger:
          Type: Schedule
          Properties:
            Schedule: cron(0 23 * * ? *) # Runs at 23:00 UTC daily
            Name: DailyReportCron
            Description: Trigger daily revenue aggregation
            Enabled: True

  ProductImagesBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ImageAnalyzerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/image-analyzer/
      Description: Read from S3, analyze product images using Rekognition, and update ProductsTable tags.
      Environment:
        Variables:
          PRODUCTS_TABLE: !Ref ProductsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - Statement:
            - Effect: Allow
              Action:
                - rekognition:DetectLabels
                - rekognition:DetectModerationLabels
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub arn:aws:s3:::*
      Events:
        S3UploadEvent:
          Type: S3
          Properties:
            Bucket: !Ref ProductImagesBucket
            Events: s3:ObjectCreated:*

  AIAssistantFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/ai-assistant/
      Description: Conversational e-commerce assistant using Bedrock.
      Environment:
        Variables:
          PRODUCTS_TABLE: !Ref ProductsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"

  WebSocketConnectionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub WebSocketConnections-${Environment}
      AttributeDefinitions:
        - AttributeName: connectionId
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: connectionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: EmailIndex
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL
          ProvisionedThroughput:
            ReadCapacityUnits: 5
            WriteCapacityUnits: 5
      ProvisionedThroughput:
        ReadCapacityUnits: 5
        WriteCapacityUnits: 5
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  WebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ECommerceWebSocket-${Environment}
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $connect
      AuthorizationType: NONE
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref ConnectIntegration

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      Description: Connect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketHandlerFunction.Arn}/invocations

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WebSocketApi
      RouteKey: $disconnect
      Target: !Join
        - '/'
        - - 'integrations'
          - !Ref DisconnectIntegration

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WebSocketApi
      Description: Disconnect Integration
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketHandlerFunction.Arn}/invocations

  WebSocketDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
    Properties:
      ApiId: !Ref WebSocketApi

  WebSocketStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WebSocketApi
      DeploymentId: !Ref WebSocketDeployment
      StageName: !Ref Environment

  WebSocketHandlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref WebSocketHandlerFunction
      Principal: apigateway.amazonaws.com

  WebSocketHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/websocket-handler/
      Description: Handles connect and disconnect requests for the WebSocket API.
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable

  OrderStreamHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: app.lambdaHandler
      CodeUri: src/stream-handler/
      Description: Processes DynamoDB Stream events from OrdersTable and broadcasts them via APIGW WebSocket API.
      Environment:
        Variables:
          CONNECTIONS_TABLE: !Ref WebSocketConnectionsTable
          WEBSOCKET_ENDPOINT: !Sub ${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref WebSocketConnectionsTable
        - Statement:
            - Effect: Allow
              Action:
                - execute-api:ManageConnections
              Resource:
                - !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebSocketApi}/${Environment}/*
      Events:
        DynamoDBStreamEvent:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt OrdersTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10

Outputs:
  ProductsTableName:
    Value: !Ref ProductsTable
    Export:
      Name: !Sub ${AWS::StackName}-ProductsTable
  OrdersTableName:
    Value: !Ref OrdersTable
    Export:
      Name: !Sub ${AWS::StackName}-OrdersTable
  DailyReportsTableName:
    Value: !Ref DailyReportsTable
    Export:
      Name: !Sub ${AWS::StackName}-DailyReportsTable
  UsersTableName:
    Value: !Ref UsersTable
    Export:
      Name: !Sub ${AWS::StackName}-UsersTable

  InvoiceBucketName:
    Value: !Ref InvoicePDFBucket
  ProductImagesBucketName:
    Value: !Ref ProductImagesBucket
  OrderCreatedTopicArn:
    Value: !Ref OrderCreatedTopic
    Export:
      Name: !Sub ${AWS::StackName}-OrderCreatedTopicArn
  EmailNotificationTopicArn:
    Value: !Ref EmailNotificationTopic
    Export:
      Name: !Sub ${AWS::StackName}-EmailNotificationTopicArn
  WebSocketApiUrl:
    Value: !Sub wss://${WebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/
    Export:
      Name: !Sub ${AWS::StackName}-WebSocketApiUrl
